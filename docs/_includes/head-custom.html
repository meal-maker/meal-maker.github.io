<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌅</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌅</text></svg>">
<link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌅</text></svg>">
<link rel="alternate" type="application/rss+xml" title="Horizon Daily RSS (All)" href="{{ '/feed.xml' | relative_url }}">
<link rel="alternate" type="application/atom+xml" title="Horizon Daily RSS (ZH)" href="{{ '/feed-zh.xml' | relative_url }}">
<link rel="alternate" type="application/atom+xml" title="Horizon Daily RSS (EN)" href="{{ '/feed-en.xml' | relative_url }}">
<style>
.feed-link { float: right; }
.feed-link a { margin-left: 32px; text-decoration: none; opacity: 0.85; }
.feed-link a:first-child { margin-left: 0; }
.feed-link a:hover { opacity: 1; text-decoration: underline; }
.title-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:.5rem}
.subscribe-link{font-size:.9em;opacity:.8;text-decoration:none}
.subscribe-link:hover{opacity:1;text-decoration:underline}
.rss-icon { font-size: 0.9em; margin-left: 0.4em; text-decoration: none; opacity: 0.85; }
.rss-icon:hover { opacity: 1; }
.rss-icon svg { width: 16px; height: 16px; vertical-align: middle; }
.rss-icon { color: #f26522; }
.subscribe-icon{opacity:.75}
.subscribe-icon:hover{opacity:1}
.subscribe-icon svg{width:18px;height:18px;vertical-align:middle}
.subscribe-icon svg circle,.subscribe-icon svg path{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
</style>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var footer = document.querySelector('footer.site-footer');
  if (!footer) return;
  var zh = "{{ '/feed-zh.xml' | relative_url }}";
  var en = "{{ '/feed-en.xml' | relative_url }}";
  var box = document.createElement('span');
  box.className = 'feed-link';
  box.innerHTML = '<a href="' + zh + '">订阅</a><a href="' + en + '">Subscribe</a>';
  footer.appendChild(box);
});
</script>
